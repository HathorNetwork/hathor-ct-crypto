name: Build native addon

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

# Least privilege. This workflow builds prebuilds and uploads them as CI
# artifacts; it does NOT publish to npm (that is done by a maintainer from the
# artifact — see the NOTE at the bottom of this file). Artifact upload/download
# use the Actions runtime token, not GITHUB_TOKEN scopes, so read-only is
# sufficient everywhere here.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            prebuild-dir: linux-x64-glibc
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            prebuild-dir: linux-arm64-glibc
          # Linux musl (wallet-headless runs on Alpine/musl)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            prebuild-dir: linux-x64-musl
            musl: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            prebuild-dir: linux-arm64-musl
            musl: true
          # macOS
          - os: macos-latest
            target: aarch64-apple-darwin
            prebuild-dir: darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            prebuild-dir: darwin-x64
          # Windows (package.json advertises win32 — back it with a real build)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            prebuild-dir: win32-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build native addon
        # musl: a cdylib cannot link against a static libc, so disable the
        # musl target's default crt-static or the *-linux-musl legs fail to
        # link (and the release-completeness assert below would then fail).
        env:
          RUSTFLAGS: ${{ matrix.musl && '-C target-feature=-crt-static' || '' }}
        run: cargo build -p hathor-ct-crypto-node --locked --features napi --release --target ${{ matrix.target }}

      - name: Copy prebuild
        shell: bash
        run: |
          mkdir -p packages/ct-crypto-node/prebuilds/${{ matrix.prebuild-dir }}
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/hathor_ct_crypto.dll packages/ct-crypto-node/prebuilds/${{ matrix.prebuild-dir }}/ct-crypto.node
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp target/${{ matrix.target }}/release/libhathor_ct_crypto.dylib packages/ct-crypto-node/prebuilds/${{ matrix.prebuild-dir }}/ct-crypto.node
          else
            cp target/${{ matrix.target }}/release/libhathor_ct_crypto.so packages/ct-crypto-node/prebuilds/${{ matrix.prebuild-dir }}/ct-crypto.node
          fi

      - name: Upload prebuild artifact
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: prebuild-${{ matrix.prebuild-dir }}
          path: packages/ct-crypto-node/prebuilds/${{ matrix.prebuild-dir }}/ct-crypto.node

  # Run Rust tests across the workspace (binding features included).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - run: cargo test --workspace --locked --features hathor-ct-crypto-node/napi

  # Collect all prebuilds into the publishable package. Restricted to pushes to
  # master and tags so PR runs can't produce a publishable artifact.
  collect:
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: prebuilds
          pattern: prebuild-*
          merge-multiple: false

      - name: Arrange prebuilds
        run: |
          mkdir -p packages/ct-crypto-node/npm-package/prebuilds
          for dir in prebuilds/prebuild-*/; do
            platform=$(basename "$dir" | sed 's/prebuild-//')
            mkdir -p packages/ct-crypto-node/npm-package/prebuilds/$platform
            cp "$dir/ct-crypto.node" packages/ct-crypto-node/npm-package/prebuilds/$platform/
          done
          cd packages/ct-crypto-node
          cp index.js index.d.ts provider.js provider.d.ts package.json ../../LICENSE npm-package/

      # Fail the release if any declared platform prebuild is missing,
      # instead of shipping a package that installs everywhere then throws at
      # require() on the platforms with no binary.
      - name: Assert all declared prebuilds present
        run: |
          set -e
          EXPECTED="darwin-arm64 darwin-x64 linux-x64-glibc linux-arm64-glibc linux-x64-musl linux-arm64-musl win32-x64"
          missing=0
          for p in $EXPECTED; do
            if [ ! -f "packages/ct-crypto-node/npm-package/prebuilds/$p/ct-crypto.node" ]; then
              echo "::error::missing prebuild for $p"
              missing=1
            fi
          done
          [ "$missing" = "0" ] || { echo "Refusing to package with missing prebuilds"; exit 1; }

      # Reproducibility / provenance: publish a checksum of every shipped binary
      # so the published bytes can be verified against this run.
      - name: Generate SHA256SUMS
        run: |
          cd packages/ct-crypto-node/npm-package
          find prebuilds -type f -name '*.node' -exec sha256sum {} \; | sort > SHA256SUMS
          cat SHA256SUMS

      - name: Upload npm package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-package
          path: packages/ct-crypto-node/npm-package/

      # Out-of-band checksums. package.json ships SHA256SUMS INSIDE the tarball,
      # so an attacker who tampered a prebuild could regenerate a matching
      # in-tarball manifest — that copy proves nothing on its own. Upload the
      # same manifest as a SEPARATE artifact so a verifier (release-publish.sh)
      # can fetch it independently and diff it against the in-tarball copy;
      # they must be byte-identical.
      - name: Upload SHA256SUMS (out-of-band)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: node-sha256sums
          path: packages/ct-crypto-node/npm-package/SHA256SUMS

  # NOTE: npm publish is intentionally NOT done here. On a `v*` tag this
  # workflow builds every prebuild and uploads the ready-to-publish
  # `npm-package` artifact; a maintainer downloads it and publishes with
  # npm 2FA — see RELEASING.md. Trade-off: no npm provenance attestation on
  # the published tarball, since that requires CI OIDC.

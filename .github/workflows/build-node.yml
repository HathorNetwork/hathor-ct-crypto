name: Build native addon (napi)

# Builds the @hathor/ct-crypto-node napi addon for every napi.targets platform.
# On push/PR it is a build+test GATE (no publish). Publishing is manual
# (workflow_dispatch) and runs from CI with npm provenance — replacing the old
# build-a-prebuild-then-publish-from-a-laptop flow (review finding M-6).
#
# Distribution model (napi-rs v3): each platform ships as its own package
# (@hathor/ct-crypto-node-<target>) wired into the main package's
# optionalDependencies by `napi prepublish`. No binaries are committed.
#
# NOTE: validate the publish path with a dry run before the first real publish.

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 0.0.1-shielded, or patch/minor/major)
        type: string
        required: true
      dry-run:
        description: Build and assemble without publishing
        type: boolean
        default: true

permissions:
  contents: read

env:
  PACKAGE: '@hathor/ct-crypto-node'
  PACKAGE_DIR: packages/ct-crypto-node

jobs:
  build:
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        if: ${{ !matrix.settings.docker }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install Rust
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.settings.target }}

      # Native hosts (darwin/windows): install deps + build against the committed lockfile.
      - name: Build (native host)
        if: ${{ !matrix.settings.docker }}
        shell: bash
        run: |
          npm ci
          npm run build -w ${{ env.PACKAGE }} -- --target ${{ matrix.settings.target }}

      # Linux (gnu/musl/aarch64): build inside the official napi-rs image, which
      # carries the correct rust + node + cross toolchain (incl. musl crt setup).
      - name: Build (docker)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185 # v3
        with:
          image: ${{ matrix.settings.docker }}
          options: --user 0:0 -v ${{ github.workspace }}:/build -w /build
          run: npm ci && npm run build -w ${{ env.PACKAGE }} -- --target ${{ matrix.settings.target }}

      - name: Upload binary
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master'))
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ env.PACKAGE_DIR }}/*.node
          if-no-files-found: error

  # Rust unit tests across the workspace (binding features included).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      # The NAPI binding itself is jest-tested in the `node` job of ci.yml; here
      # we cargo-test its crypto logic (crypto-core) + the mobile UniFFI crate.
      # Excluded: the #[napi] glue can't link a standalone test binary (napi-rs 3).
      - run: cargo test --workspace --exclude hathor-ct-crypto-node --locked

  publish:
    name: Publish to npm
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build, test]
    timeout-minutes: 15
    # Configure the `npm-publish` environment in repo Settings: allowed publishers
    # as Required reviewers + NPM_TOKEN as an environment secret. Publish (real or
    # dry-run) waits for reviewer approval before it starts.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # npm provenance (closes the M-6 provenance gap)
    defaults:
      run:
        working-directory: packages/ct-crypto-node
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Install deps
        working-directory: .
        run: npm ci
      - name: Create per-platform package dirs
        run: npx napi create-npm-dirs
      - name: Set the version to publish
        run: npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version
      - name: Download platform binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/ct-crypto-node/artifacts
          pattern: bindings-*
          merge-multiple: true
      - name: Move binaries into npm/<target>
        run: npx napi artifacts --dir artifacts
      - name: Publish to npm
        # prepublishOnly (napi prepublish -t npm) publishes the per-platform
        # packages and wires the main package's optionalDependencies; npm then
        # publishes the main package with provenance. Prereleases go to the
        # `shielded` dist-tag, never `latest`. Dry-run skips scripts so no
        # platform package is actually published.
        run: |
          if [ "${{ inputs.dry-run }}" = "false" ]; then
            npm publish --provenance --access public --tag shielded
          else
            echo "Dry run — validating the main package tarball without publishing."
            npm publish --access public --tag shielded --dry-run --ignore-scripts
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: ci

on:
  push:
    branches: [master]
  pull_request:

# Least privilege: every job here only reads the repo and runs tests — none
# publishes, comments, or writes releases. Grant read-only by default; add a
# narrower job-level grant if a future job needs more.
permissions:
  contents: read

jobs:
  rust:
    name: cargo test (workspace + bindings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      # Exercise the binding crates, not just crypto-core. The mobile (UniFFI)
      # crate is a plain workspace member, so it is built and tested here too.
      - name: cargo check (workspace, NAPI feature)
        run: cargo check --workspace --locked --features hathor-ct-crypto-node/napi
      - name: cargo test (crypto-core + NAPI BigInt + UniFFI tests)
        run: cargo test --workspace --locked --features hathor-ct-crypto-node/napi

  bindings-drift:
    name: mobile bindings drift check (Swift + Kotlin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      # Regenerate the Swift and Kotlin bindings from the current Rust surface
      # and fail if the checked-in copies have drifted. Stale committed bindings
      # fatalError on the UniFFI checksum handshake at the first call on iOS —
      # regenerate + commit ios/ + android/.../uniffi/ whenever
      # packages/ct-crypto-mobile/src/uniffi_bindings.rs changes (see the
      # package README for the exact commands).
      - name: Build UniFFI library
        run: cargo build -p hathor-ct-crypto-mobile --locked --release
      - name: Regenerate Swift + Kotlin bindings
        # --no-format: the runner image ships swiftformat/ktlint and bindgen
        # auto-formats when they're present, which makes the output depend on
        # the runner's formatter version. The committed bindings are generated
        # unformatted; keep regeneration deterministic.
        run: |
          cargo run -p hathor-ct-crypto-mobile --locked --features uniffi-cli --bin uniffi-bindgen -- \
            generate --library target/release/libhathor_ct_crypto_mobile.dylib \
            --language swift --no-format --out-dir /tmp/bindings-generated/swift
          cargo run -p hathor-ct-crypto-mobile --locked --features uniffi-cli --bin uniffi-bindgen -- \
            generate --library target/release/libhathor_ct_crypto_mobile.dylib \
            --language kotlin --no-format --out-dir /tmp/bindings-generated/kotlin
      - name: Fail on drift
        run: |
          set -e
          diff -u packages/ct-crypto-mobile/ios/hathor_ct_crypto.swift \
                  /tmp/bindings-generated/swift/hathor_ct_crypto.swift
          diff -u packages/ct-crypto-mobile/ios/hathor_ct_cryptoFFI.h \
                  /tmp/bindings-generated/swift/hathor_ct_cryptoFFI.h
          diff -u packages/ct-crypto-mobile/ios/hathor_ct_cryptoFFI.modulemap \
                  /tmp/bindings-generated/swift/hathor_ct_cryptoFFI.modulemap
          diff -u packages/ct-crypto-mobile/android/src/main/java/uniffi/hathor_ct_crypto/hathor_ct_crypto.kt \
                  /tmp/bindings-generated/kotlin/uniffi/hathor_ct_crypto/hathor_ct_crypto.kt

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: npm audit (prod deps)
        run: npm audit --omit=dev --audit-level=high

  node:
    name: npm test (workspaces, real crypto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      # Build the real native addon and run the JS suites against it (not
      # stubs/fakes). CT_CRYPTO_REQUIRE_NATIVE=1 makes the node suite FAIL
      # rather than silently skip if the addon is missing.
      - name: Build native addon
        run: cargo build -p hathor-ct-crypto-node --locked --features napi --release
      - name: Stage prebuild for the loader
        # The loader (index.js) resolves linux-<arch>-<libc> on Linux; the
        # ubuntu-latest runner is glibc, so stage into linux-x64-glibc or the
        # native addon never loads and the JS suite silently skips.
        run: |
          mkdir -p packages/ct-crypto-node/prebuilds/linux-x64-glibc
          cp target/release/libhathor_ct_crypto.so \
             packages/ct-crypto-node/prebuilds/linux-x64-glibc/ct-crypto.node
      # npm ci validates the committed package-lock.json.
      - name: npm ci
        run: npm ci
      - name: npm run lint
        run: npm run lint --if-present
      - name: npm test
        env:
          CT_CRYPTO_REQUIRE_NATIVE: '1'
        run: npm test --if-present

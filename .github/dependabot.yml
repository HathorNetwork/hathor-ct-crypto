# Automated dependency updates for every ecosystem in this repo.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # The mobile package's Android side (JNA for the UniFFI bindings, AGP/Kotlin
  # plugin fallbacks).
  - package-ecosystem: gradle
    directory: "/packages/ct-crypto-mobile/android"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

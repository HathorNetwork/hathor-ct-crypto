[package]
name = "hathor-ct-crypto-node"
version = "0.0.1-shielded"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
description = "NAPI bindings for the Hathor confidential-transaction crypto core. Powers @hathor/ct-crypto-node (Node native addon). The mobile UniFFI surface lives in the sibling hathor-ct-crypto-mobile crate."

[dependencies]
hathor-ct-crypto-core = { path = "../../crypto-core" }
secp256k1-zkp = { workspace = true }

[dependencies.napi]
version = "3"
optional = true
default-features = false
features = ["napi8"]

[dependencies.napi-derive]
version = "3"
optional = true

[build-dependencies]
napi-build = { version = "2", optional = true }

[features]
default = ["std"]
std = ["secp256k1-zkp/std"]
napi = ["dep:napi", "dep:napi-derive", "dep:napi-build"]

[lib]
name = "hathor_ct_crypto"
crate-type = ["lib", "cdylib", "staticlib"]

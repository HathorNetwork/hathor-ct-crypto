[package]
name = "hathor-ct-crypto-wasm"
version = "0.0.1-shielded"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
description = "Browser-compatible (wasm-bindgen) build of the Hathor confidential-transaction crypto primitives. Verifier-only: see @hathor/ct-crypto-node for the full Node surface."

[dependencies]
hathor-ct-crypto-core = { path = "../../crypto-core" }
secp256k1-zkp = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true }
wasm-bindgen = "0.2"

# Required by the wasm32 target so the pulled-in crates that need a
# CSPRNG (rand, secp256k1, our own range-proof nonce generator) can
# call `Math.random()`-backed `getrandom`.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[lib]
name = "hathor_ct_crypto_wasm"
crate-type = ["cdylib", "rlib"]
